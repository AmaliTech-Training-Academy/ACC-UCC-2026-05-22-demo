server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Use Docker's embedded DNS resolver and assign the upstream to a
  # variable. This makes nginx resolve `backend` per request instead of at
  # startup, so the container stays up even if the backend isn't ready yet.
  resolver 127.0.0.11 valid=10s ipv6=off;

  location /api/ {
    set $backend_upstream backend:4000;
    proxy_pass http://$backend_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
